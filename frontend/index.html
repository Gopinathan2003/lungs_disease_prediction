<!DOCTYPE html>
<html>
<head>
  <title>Lung Disease Predictor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h1 class="text-center text-primary">🫁 Lung Disease Predictor</h1>
    <div class="card shadow">
      <div class="card-body text-center">
        <input type="file" id="image" accept="image/*" class="form-control mb-3">
        <button onclick="predict()" class="btn btn-success btn-lg">Predict</button>
        <div id="result" class="mt-4"></div>
      </div>
    </div>
    <div class="mt-4 text-center">
      <a href="http://localhost:5000" target="_blank" class="btn btn-info">MLflow Pipeline Dashboard</a>
      <a href="http://localhost:8080" target="_blank" class="btn btn-info">Airflow Pipeline</a>
      <a href="http://localhost:3000" target="_blank" class="btn btn-info">Grafana Monitoring</a>
    </div>
  </div>

  <script>
    async function predict() {
      const file = document.getElementById("image").files[0];
      if (!file) return alert("Upload X-ray");
      const form = new FormData();
      form.append("file", file);
      const res = await fetch("http://localhost:8000/predict", {method: "POST", body: form});
      const data = await res.json();
      document.getElementById("result").innerHTML = `
        <h3>Prediction: <span class="${data.prediction==='PNEUMONIA'?'text-danger':'text-success'}">${data.prediction}</span></h3>
        <p>Confidence: ${data.confidence}</p>
        <p>Latency: ${data.latency_ms} ms</p>
      `;
    }
  </script>
</body>
</html>
