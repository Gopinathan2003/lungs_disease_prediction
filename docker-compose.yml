services:
  model_server:
    build:
      context: .
      dockerfile: dockerfile
    command: mlflow models serve -m /models/latest -p 8080 --host 0.0.0.0 --no-conda
    volumes:
      - ./models:/models:ro
    ports:
      - "8080:8080"

  api:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - model_server
    environment:
      - MODEL_URI=/app/models/latest
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "8081:80"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
