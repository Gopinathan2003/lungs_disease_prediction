global:
  smtp_smarthost: '${MAILTRAP_SMTP_HOST}:${MAILTRAP_SMTP_PORT}'
  smtp_from: '${ALERT_FROM_EMAIL}'
  smtp_auth_username: '${MAILTRAP_SMTP_USERNAME}'
  smtp_auth_password: '${MAILTRAP_SMTP_PASSWORD}'
  smtp_require_tls: true

route:
  receiver: mailtrap-email
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: mailtrap-email
    email_configs:
      - to: '${ALERT_TO_EMAIL}'
        send_resolved: true
